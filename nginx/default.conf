# univerid.ru — HTTP to HTTPS
server {
    listen 80;
    server_name univerid.ru www.univerid.ru;
    location /.well-known/acme-challenge/ {
        alias /var/www/acme-challenge/;
    }
    location / { return 301 https://$host$request_uri; }
}

