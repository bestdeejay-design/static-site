# univerid.ru — HTTPS static
server {
    listen 443 ssl http2;
    server_name univerid.ru www.univerid.ru;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        try_files $uri $uri/ =404;
    }
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot)$ {
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, immutable";
        expires 30d;
    }
    location ~ /\. { deny all; }
}

# ti200.ru — HTTPS proxy to WordPress
server {
    listen 443 ssl http2;
    server_name ti200.ru www.ti200.ru;
    ssl_certificate /etc/nginx/certs/ti200.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/ti200.ru/privkey.pem;

    client_max_body_size 32M;

    location / {
        proxy_pass http://wp-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect https://$host:8443/ /;
        proxy_redirect http://$host/ /;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot)$ {
        proxy_pass http://wp-nginx:80;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, immutable";
    }
}

# archive.ti200.ru — HTTPS: gallery at root, Directus admin/api via proxy
server {
    listen 443 ssl http2;
    server_name archive.ti200.ru;
    ssl_certificate /etc/nginx/certs/archive.ti200.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/archive.ti200.ru/privkey.pem;
    client_max_body_size 128M;

    root /var/www/archive-gallery;
    index index.html;

    resolver 127.0.0.11 valid=5s;
    set $directus_upstream http://directus:8055;

    location / {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        try_files $uri $uri/ @directus;
    }

    location @directus {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        proxy_pass $directus_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /.well-known/acme-challenge/ {
        alias /var/www/acme-challenge/;
    }
}
