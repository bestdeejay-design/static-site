services:
  nginx:
    image: nginx:alpine
    container_name: static-site
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/archive/certs:/etc/nginx/certs:ro
