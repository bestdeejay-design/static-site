  <!-- Landing Page -->
  <div id="landing" class="page">
    <button class="theme-toggle" onclick="toggleTheme()" title="Сменить тему">
      <svg class="icon"><use href="#icon-sun"/></svg>
    </button>
    
    <div class="hero">
      <div class="logo">
        <svg class="icon-lg"><use href="#icon-grad"/></svg>
      </div>
      <h1>UniverID</h1>
      <p class="tagline">Цифровая экосистема университета</p>
      <p class="desc">Электронная зачётка, расписание, связь с деканатом, проход в общежитие — всё в одном приложении</p>
      
      <div class="features">
        <div class="feature">
          <svg class="icon"><use href="#icon-book"/></svg>
          <span>Электронная зачётка</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-calendar"/></svg>
          <span>Расписание</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-chat"/></svg>
          <span>Чат с деканом</span>
        </div>
        <div class="feature">
          <svg class="icon"><use href="#icon-door"/></svg>
          <span>Проход в общежитие</span>
        </div>
      </div>
      
      <!-- Переключатель Студент/Выпускник -->
      <div style="margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 12px;">
        <span id="studentLabel" style="font-size: 14px; color: var(--text-muted);">Студент</span>
        <div onclick="toggleUserMode()" style="width: 56px; height: 28px; background: var(--primary); border-radius: 14px; position: relative; cursor: pointer;">
          <div id="modeToggle" style="width: 24px; height: 24px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.3s;"></div>
        </div>
        <span id="graduateLabel" style="font-size: 14px; color: var(--text-muted);">Выпускник</span>
      </div>
      
      <button class="btn-primary" onclick="openApp()">
        Открыть демо
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>
      
      <p class="note">Это демо-версия • Работает без интернета</p>
    </div>
  </div>

  <!-- Mobile App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>
      
      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Главная</h2>
        <div class="header-actions">
          <button class="icon-btn" id="headerQrBtn" onclick="handleHeaderQR()" title="Проход">
            <svg class="icon"><use href="#icon-qr"/></svg>
          </button>
          <div class="profile-icon" onclick="handleProfileClick()">
            <svg class="icon"><use href="#icon-user"/></svg>
          </div>
        </div>
      </div>
      
      <div class="app-content" id="content">
        <!-- Content injected by JS -->
      </div>
      
      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('home', this)">
          <svg class="icon-nav"><use href="#icon-home"/></svg>
          <span>Главная</span>
        </button>
        <button class="nav-item student-nav" onclick="showPage('grades', this)">
          <svg class="icon-nav"><use href="#icon-chart"/></svg>
          <span>Оценки</span>
        </button>
        <button class="nav-item student-nav" onclick="showPage('schedule', this)">
          <svg class="icon-nav"><use href="#icon-calendar"/></svg>
          <span>Расписание</span>
        </button>
        <button class="nav-item student-nav" onclick="showPage('chat', this)">
          <svg class="icon-nav"><use href="#icon-chat"/></svg>
          <span>Чат</span>
          <span class="chat-badge">3</span>
        </button>
        <button class="nav-item graduate-nav" style="display:none" onclick="showPage('alumni-endowment', this)">
          <svg class="icon-nav"><use href="#icon-wallet-giftcard"/></svg>
          <span>Фонд</span>
        </button>
      </div>
    </div>
    
    <button class="btn-exit" onclick="closeApp()">Вернуться на главную</button>
  </div>

  <script src="js/app.js"></script>
  <div style="position:fixed;top:12px;left:16px;z-index:9999;"><a href="https://axiiom.ru/demo/app/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(10,10,15,.9);color:#C7C7CC;border:1px solid rgba(255,255,255,.08);border-radius:20px;text-decoration:none;font-family:Inter,sans-serif;font-size:13px;transition:all .2s;" onmouseover="this.style.background='rgba(10,10,15,1)';this.style.color='#F5F5F7';" onmouseout="this.style.background='rgba(10,10,15,.9)';this.style.color='#C7C7CC';">← Все демо AXIIOM</a></div>
